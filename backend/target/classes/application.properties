# ============================================================
# San Blas — Configuración local (sin Docker)
# ============================================================

# Server
server.port=8080
spring.application.name=sanblas-gestion-comercial

# Base de datos MySQL local
# Ajustar usuario y contraseña según tu instalación de MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/sanblas_db?useSSL=false&serverTimezone=America/Argentina/Buenos_Aires&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# HikariCP - pool de conexiones
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.connection-timeout=30000

# JWT
jwt.secret=SanBlasSecretKey2024MustBeAtLeast256BitsLongForHS256Algorithm!
jwt.expiration=86400000

# CORS - permitir peticiones del frontend React en dev
cors.allowed-origins=http://localhost:5173,http://localhost:3000

# Logs
logging.level.com.sanblas=INFO
logging.level.org.springframework.security=WARN
